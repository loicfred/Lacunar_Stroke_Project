<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lacunar Stroke Detection Assignment</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body onload="setTimeout(() => {
        document.getElementById('header').style.display='flex';
        document.getElementById('main').style.display='block';
        document.getElementById('loading').style.display='none';
    }, 5000);">
<div id="loading">
    <div class="spinner"></div>
</div>

<!-- Main Bar -->
<nav id="header" style="display: none;" class="navbar">
    <div class="nav-title"> Lacunar Stroke Detection System</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#" id="logoutBtn">Logout</a>
    </div>
</nav>

<!-- Form Container -->
<div id="main" style="display: none;" class="form-container">
    <h2>Lacunar Stroke Detection</h2>

    <form id="strokeForm" action="/api/predict" method="post">

        <!-- Personal Information -->
        <div class="form-section">
            <h3>Personal Information</h3>

            <label>First Name</label>
            <input type="text" name="firstName" required>

            <label>Last Name</label>
            <input type="text" name="lastName" required>

            <label>Address</label>
            <input type="text" name="address" required>

            <label>Age Range</label>
            <select name="age" required>
                <option value="" disabled selected>Select</option>
                <option value="30-39">30-39</option>
                <option value="40–49">40–49</option>
                <option value="50–59">50–59</option>
                <option value="60–69">60–69</option>
                <option value="70–79">70–79</option>
                <option value="80+">80+</option>
            </select>

            <label>Sex</label>
            <select name="sex" required>
                <option value="" disabled selected>Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Phone Number</label>
            <input type="text" name="phone" required>

            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <!-- Health Information -->
        <div class="form-section">
            <h3>Health Information</h3>

            <label>Hypertension</label>
            <div class="radio-group">
                <label><input type="radio" name="hypertension" value="1" required> Yes (1) </label>
                <label><input type="radio" name="hypertension" value="0"> No (0) </label>
            </div>

            <label>Diabetes</label>
            <div class="radio-group">
                <label><input type="radio" name="diabetes" value="1" required> Yes (1) </label>
                <label><input type="radio" name="diabetes" value="0"> No (0) </label>
            </div>

            <label>Smoking History</label>
            <div class="radio-group">
                <label><input type="radio" name="smoking" value="1" required> Yes (1) </label>
                <label><input type="radio" name="smoking" value="0"> No (0) </label>
            </div>
        </div>

        <!-- Sensory Information -->
        <div class="form-section">
            <h3>Sensory Information</h3>

            <label>Sensory Feeling (Left Side)</label>
            <input type="range" name="left_asymmetry" min="0" max="10"  step="0.01" value="5.00"
                   oninput="leftValue.textContent=this.value">
            <span id="leftValue">5</span>

            <label>Sensory Feeling (Right Side)</label>
            <input type="range" name="right_asymmetry" min="0" max="10"  step="0.01" value="5.00"
                   oninput="rightValue.textContent=this.value">
            <span id="rightValue">5</span>
        </div>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>

<script src="../static/script.js"></script>
</body>
</html>
