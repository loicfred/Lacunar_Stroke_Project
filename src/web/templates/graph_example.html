<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensory Score Over Time</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<canvas id="sensoryChart" width="600" height="300"></canvas>

<script>
    const ctx = document.getElementById('sensoryChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: [
                'Day 1',
                'Day 2',
                'Day 3',
                'Day 4',
                'Day 5',
                'Day 6',
                'Day 7',
                'Day 8',
                'Day 9',
                'Day 10'
            ],
            datasets: [
                {
                    label: 'Left Sensory',
                    data: [6.9, 6.4, 6.19, 6.06, 5.89, 5.39, 5.71, 5.49, 5.06, 4.83],
                    borderWidth: 2,
                    tension: 0,
                    fill: false
                },
                {
                    label: 'Right Sensory',
                    data: [7.1, 6.73, 6.14, 6.32, 6.18, 5.89, 5.42, 5.14, 5.44, 5.13],
                    borderWidth: 2,
                    tension: 0,
                    fill: false
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Time (Days)'
                    }
                },
                y: {
                    min: 0,
                    max: 10,
                    ticks: {
                        stepSize: 1
                    },
                    title: {
                        display: true,
                        text: 'Sensory Score'
                    }
                }
            }
        }
    });
</script>

</body>
</html>
